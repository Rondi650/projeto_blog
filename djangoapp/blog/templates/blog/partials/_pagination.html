{% if page_obj and page_obj.has_other_pages %}

<div class="pagination-wrapper">
  <div class="page">
    <nav class="pagination-links" aria-label="Pagination">
      <span class="step-links">
        {% if page_obj.has_previous %}
          <a href="?page=1{{ search_url }}" title="Primeira página">⟨⟨</a>
          <a href="?page={{ page_obj.previous_page_number }}{{ search_url }}" title="Página anterior">⟨</a>
        {% endif %}

        <span class="current">
          {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}
        </span>

        {% if page_obj.has_next %}
          <a href="?page={{ page_obj.next_page_number }}{{ search_url }}" title="Próxima página">⟩</a>
          <a href="?page={{ page_obj.paginator.num_pages }}{{ search_url }}" title="Última página">⟩⟩</a>
        {% endif %}
      </span>
    </nav>
  </div>
</div>

{% endif %}
