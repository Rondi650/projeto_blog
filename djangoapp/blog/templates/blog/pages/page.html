{% extends 'blog/base.html' %} 

{% block content %}
  <main class="main-content section-wrapper">
    <div class="section-content-wide">
      <div class="section-gap">
        
        {% if page %}
          <h1 class="center">{{ page.title }}</h1>
          {{ page.content | safe }}
        {% else %}
          <h1 class="center">Uma pagina</h1>
          <p>Esse texto sera gerado caso voce nao encontre a pagina desejada.</p>
        {% endif %}
        
      </div>
    </div>
  </main>
{% endblock content %}
