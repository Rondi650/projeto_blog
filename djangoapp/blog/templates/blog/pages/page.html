{% extends 'blog/base.html' %} 

{% block content %}
  <main class="single-post">
    <article class="single-post-content">
      
      {% if page %}
        <h1>{{ page.title }}</h1>
        {{ page.content | safe }}
      {% else %}
        <h1>Uma pagina</h1>
        <p>Esse texto sera gerado caso voce nao encontre a pagina desejada.</p>
      {% endif %}
      
    </article>
  </main>
{% endblock content %}
